name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          OUTDIR="curdx-${GOOS}-${GOARCH}"
          mkdir -p "$OUTDIR"

          # Stub binaries not yet implemented — skip them
          SKIP=" laskd curdx-arch "

          for cmd in cmd/*/; do
            name=$(basename "$cmd")
            if echo "$SKIP" | grep -q " ${name} "; then
              echo "Skipping stub: $name"
              continue
            fi
            echo "Building $name..."
            go build -trimpath \
              -ldflags="-s -w -X main.Version=${VERSION} -X main.GitCommit=${GITHUB_SHA::7} -X main.GitDate=$(date -u +%Y-%m-%d)" \
              -o "${OUTDIR}/${name}${EXT}" "./${cmd}"
          done

          # Include non-binary files
          cp -r claude_skills codex_skills config "$OUTDIR/"
          cp install.sh "$OUTDIR/"

      - name: Package
        run: |
          DIR="curdx-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -qr "${DIR}.zip" "$DIR"
          else
            tar czf "${DIR}.tar.gz" "$DIR"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: curdx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: curdx-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          # Collect commits by category
          feat="" fix="" docs="" chore="" refactor="" perf="" other=""
          while IFS= read -r msg; do
            case "$msg" in
              feat:*|feat\(*) feat="${feat}${msg#*: }"$'\n' ;;
              fix:*|fix\(*)   fix="${fix}${msg#*: }"$'\n' ;;
              docs:*|docs\(*) docs="${docs}${msg#*: }"$'\n' ;;
              chore:*|chore\(*) chore="${chore}${msg#*: }"$'\n' ;;
              refactor:*|refactor\(*) refactor="${refactor}${msg#*: }"$'\n' ;;
              perf:*|perf\(*) perf="${perf}${msg#*: }"$'\n' ;;
              *)              other="${other}${msg}"$'\n' ;;
            esac
          done < <(git log --pretty=format:"%s" "$RANGE" --no-merges)

          # --- Build English section ---
          EN=""
          if [ -n "$feat" ]; then
            EN="${EN}### Added"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && EN="${EN}- ${line}"$'\n'; done <<< "$feat"
            EN="${EN}"$'\n'
          fi
          if [ -n "$fix" ]; then
            EN="${EN}### Fixed"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && EN="${EN}- ${line}"$'\n'; done <<< "$fix"
            EN="${EN}"$'\n'
          fi
          if [ -n "$docs" ]; then
            EN="${EN}### Documentation"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && EN="${EN}- ${line}"$'\n'; done <<< "$docs"
            EN="${EN}"$'\n'
          fi
          if [ -n "$refactor" ]; then
            EN="${EN}### Refactored"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && EN="${EN}- ${line}"$'\n'; done <<< "$refactor"
            EN="${EN}"$'\n'
          fi
          if [ -n "$perf" ]; then
            EN="${EN}### Performance"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && EN="${EN}- ${line}"$'\n'; done <<< "$perf"
            EN="${EN}"$'\n'
          fi
          if [ -n "$chore" ]; then
            EN="${EN}### Maintenance"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && EN="${EN}- ${line}"$'\n'; done <<< "$chore"
            EN="${EN}"$'\n'
          fi
          if [ -n "$other" ]; then
            EN="${EN}### Other"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && EN="${EN}- ${line}"$'\n'; done <<< "$other"
            EN="${EN}"$'\n'
          fi

          # --- Build Chinese section (same items, translated headers) ---
          ZH=""
          if [ -n "$feat" ]; then
            ZH="${ZH}### 新增"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && ZH="${ZH}- ${line}"$'\n'; done <<< "$feat"
            ZH="${ZH}"$'\n'
          fi
          if [ -n "$fix" ]; then
            ZH="${ZH}### 修复"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && ZH="${ZH}- ${line}"$'\n'; done <<< "$fix"
            ZH="${ZH}"$'\n'
          fi
          if [ -n "$docs" ]; then
            ZH="${ZH}### 文档"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && ZH="${ZH}- ${line}"$'\n'; done <<< "$docs"
            ZH="${ZH}"$'\n'
          fi
          if [ -n "$refactor" ]; then
            ZH="${ZH}### 重构"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && ZH="${ZH}- ${line}"$'\n'; done <<< "$refactor"
            ZH="${ZH}"$'\n'
          fi
          if [ -n "$perf" ]; then
            ZH="${ZH}### 性能"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && ZH="${ZH}- ${line}"$'\n'; done <<< "$perf"
            ZH="${ZH}"$'\n'
          fi
          if [ -n "$chore" ]; then
            ZH="${ZH}### 维护"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && ZH="${ZH}- ${line}"$'\n'; done <<< "$chore"
            ZH="${ZH}"$'\n'
          fi
          if [ -n "$other" ]; then
            ZH="${ZH}### 其他"$'\n'
            while IFS= read -r line; do [ -n "$line" ] && ZH="${ZH}- ${line}"$'\n'; done <<< "$other"
            ZH="${ZH}"$'\n'
          fi

          # Fallback if no categorized commits found
          if [ -z "$EN" ]; then
            EN="Maintenance release."$'\n'
            ZH="维护版本。"$'\n'
          fi

          PREV_DISPLAY="${PREV_TAG:-initial}"
          BODY="## What's Changed"$'\n\n'"${EN}"$'\n'"---"$'\n\n'"## 更新内容"$'\n\n'"${ZH}"$'\n'"---"$'\n\n'"**Full Changelog**: https://github.com/curdx/curdx-bridge/compare/${PREV_DISPLAY}...${TAG}"

          # Write to file to avoid shell escaping issues
          echo "$BODY" > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            curdx-darwin-amd64.tar.gz
            curdx-darwin-arm64.tar.gz
            curdx-linux-amd64.tar.gz
            curdx-linux-arm64.tar.gz
            curdx-windows-amd64.zip
